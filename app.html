<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ryan's Riddle Generator</title>
  <style>
    body {
      background-color: #020617;
      color: #e5e7eb;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background-color: #111827;
      padding: 20px 30px;
      border-radius: 10px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      background-color: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nerdy Question Generator</h1>
    <p id="riddle">Click the button to get a nerdy question.</p>
    <p id="answer" style="display:none; font-style: italic;"></p>
    <button id="newRiddleBtn">New Question</button>
    <button id="showAnswerBtn" style="display:none;">Show Answer</button>
    <p style="margin-top: 20px;"><a href="scratch.html">Back to Scratch Page</a></p>
  </div>

  <script>
    const riddles = [
      { q: "What is in my pocket?", a: "Second Breakfast" },
      { q: "When does a man die?", a: "When he is forgotten" },
      { q: "Life before death, strength before weakness, ______________", a: "journey before destination" },
      { q: "Which Star Wars movie first features Luke's green lightsaber?", a: "Return of the Jedi" }
    ];

    const riddleEl = document.getElementById('riddle');
    const answerEl = document.getElementById('answer');
    const newBtn = document.getElementById('newRiddleBtn');
    const showBtn = document.getElementById('showAnswerBtn');

    let currentIndex = null;

    function newRiddle() {
      const index = Math.floor(Math.random() * riddles.length);
      currentIndex = index;
      riddleEl.textContent = riddles[index].q;
      answerEl.textContent = riddles[index].a;
      answerEl.style.display = 'none';
      showBtn.style.display = 'inline-block';
    }

    function showAnswer() {
      if (currentIndex !== null) {
        answerEl.style.display = 'block';
      }
    }

    newBtn.addEventListener('click', newRiddle);
    showBtn.addEventListener('click', showAnswer);
  </script>
</body>
</html>
